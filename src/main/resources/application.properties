spring.application.name=iyed_mohamed_artic10

### Database Configuration ###
spring.datasource.url=jdbc:mysql://localhost:3306/my_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
spring.datasource.username=iyed
